<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Select Theatre</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Select Theatre</h2><p class="muted">Choose your preferred cinema location.</p></div></section><section class="section"><div class="container" id="list"></div></section><div id="foot"></div><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();document.getElementById('foot').innerHTML=footer();let b=requireBooking();list.innerHTML=THEATRES.map((t,i)=>`<div class="card theatre"><div><h3>${t.name}</h3><p class="muted">${t.area} • ${t.distance}</p><p>${t.features}</p></div><button class="btn" onclick="pick(${i})">Select</button></div>`).join('');function pick(i){b.theatre=THEATRES[i];save('booking',b);location.href='showtime.html'}</script></body></html>
