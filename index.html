<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNC ROX Show - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: rgb(36, 12, 132);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      width: 320px;
    }

    h1 {
      font-size: 26px;
      color: #000;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    input[type="email"] {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }

    .btn {
      width: 95%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .continue-btn {
      background-color: #d32f2f;
      color: white;
    }

    .continue-btn:hover {
      background-color: #b71c1c;
      transform: scale(1.03);
    }

    .fb-btn {
      background-color: #4267B2;
      color: white;
      margin-top: 10px;
    }

    .fb-btn:hover {
      background-color: #365899;
      transform: scale(1.03);
    }

    p {
      margin-top: 15px;
      font-size: 14px;
    }

    a {
      color: #1976d2;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .error {
      color: red;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>DNC ROX show</h1>
    <h3>Log in</h3>
    <input type="email" id="email" placeholder="Email Address" required>
    <p class="error" id="error-msg">Please enter a valid email address!</p>

    <button class="btn continue-btn" onclick="goHome()">CONTINUE</button>
    <p>or</p>
    <button class="btn fb-btn" onclick="facebookRedirect()">Continue with Facebook</button>

    <p>New to DNC ROX Show? <a href="#">Sign up</a></p>
  </div>

  <script>
    const continueBtn = document.getElementById('continueBtn');
    const emailField = document.getElementById('email');
    const errorMsg = document.getElementById('error-msg');

    continueBtn.addEventListener('click', function() {
      const emailValue = emailField.value.trim();
      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

      if (!emailValue.match(emailPattern)) {
        errorMsg.style.display = 'block';
        emailField.style.borderColor = 'red';
      } else {
        errorMsg.style.display = 'none';
        emailField.style.borderColor = '#ccc';
        alert("Login successful for " + emailValue);
        // redirect example:
        // window.location.href = "dashboard.html";
      }
    });
    function goHome() {
        window.location.href="home.html";
    }

    function facebookRedirect() {
      window.location.href = "https://www.facebook.com/";
    }
  </script>

</body>
</html>
