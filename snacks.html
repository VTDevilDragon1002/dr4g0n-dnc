<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Snacks Combo</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Add Snacks</h2><p class="muted">Complete your theatre experience.</p></div></section><section class="section"><div class="container"><div class="grid" id="items"></div><div style="text-align:right;margin-top:20px"><button class="btn secondary" onclick="skip()">Skip</button> <button class="btn" onclick="go()">Continue to Payment</button></div></div></section><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();let b=requireBooking(),cart=[];let food=[['Classic Popcorn',180],['Cheese Popcorn',220],['Pepsi Combo',160],['Burger Combo',260]];items.innerHTML=food.map((f,i)=>`<div class="card"><h3>${f[0]}</h3><p class="muted">Fresh theatre snacks</p><h2>${money(f[1])}</h2><button class="btn" onclick="add(${i})">Add</button></div>`).join('');function add(i){cart.push({name:food[i][0],price:food[i][1]});alert(food[i][0]+' added')}function skip(){b.snacks=[];b.snackAmount=0;save('booking',b);location.href='payment.html'}function go(){b.snacks=cart;b.snackAmount=cart.reduce((a,x)=>a+x.price,0);save('booking',b);location.href='payment.html'}</script></body></html>
