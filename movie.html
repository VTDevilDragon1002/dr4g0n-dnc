<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Movie Details</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><div class="detail"><div id="poster" class="detail-poster"></div><div class="info-card"><span class="badge" id="cert"></span><h1 id="title"></h1><p><span class="rating" id="rating"></span> • <span id="votes"></span> votes</p><p class="muted" id="meta"></p><p id="story"></p><div class="chips"><span class="chip">2D</span><span class="chip">IMAX</span><span class="chip">Dolby Atmos</span><span class="chip">Tamil / English subtitles</span></div><br><button class="btn" id="book">Book Tickets</button></div></div></div></section><div id="foot"></div><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();document.getElementById('foot').innerHTML=footer();let m=movieById(qs('id'));document.body.style.backgroundImage=`linear-gradient(180deg,rgba(8,8,18,.92),#080812),url('${m.banner}')`;document.getElementById('poster').style.backgroundImage=`url('${m.poster}')`;title.textContent=m.title;cert.textContent=m.cert;rating.textContent='★ '+m.rating;votes.textContent=m.votes;meta.textContent=`${m.lang} • ${m.genre} • ${m.duration}`;story.textContent=m.story;book.onclick=()=>{save('booking',{movie:m});location.href='theatre.html'}</script></body></html>
