<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Select Seats</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Select Seats</h2><p class="muted">Pick your favourite seats. Gold ₹190 • Premium ₹250.</p></div></section><section class="section"><div class="container layout"><div class="screen">SCREEN THIS WAY</div><div class="seat-grid" id="seatGrid"></div><div class="chips" style="justify-content:center;margin-top:22px"><span class="chip">Available</span><span class="chip">Selected</span><span class="chip">Booked</span></div></div></section><div class="summary"><div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><b id="sel">No seats selected</b><p class="muted" style="margin:4px 0" id="amt">Total ₹0</p></div><button class="btn" onclick="next()">Continue</button></div></div><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();let b=requireBooking(),selected=[];const booked=['A3','B4','C7','D2','E8','F5'];let rows=['A','B','C','D','E','F','G'];seatGrid.innerHTML=rows.map(r=>`<div class="seat-row"><span class="row-name">${r}</span>${Array.from({length:10},(_,i)=>{let id=r+(i+1),cls=booked.includes(id)?'booked':'';return `<button class="seat ${cls}" onclick="toggle(this,'${id}')">${i+1}</button>`}).join('')}</div>`).join('');function toggle(el,id){if(el.classList.contains('booked'))return;if(selected.includes(id)){selected=selected.filter(s=>s!==id);el.classList.remove('selected')}else{selected.push(id);el.classList.add('selected')}let total=selected.reduce((a,s)=>a+(s[0]>'D'?250:190),0);sel.textContent=selected.length?selected.join(', '):'No seats selected';amt.textContent='Total '+money(total)}function next(){if(!selected.length){alert('Select at least one seat');return}let total=selected.reduce((a,s)=>a+(s[0]>'D'?250:190),0);b.seats=selected;b.seatAmount=total;save('booking',b);location.href='snacks.html'}</script></body></html>
