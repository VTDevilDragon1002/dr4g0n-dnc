<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Booking History</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Booking History</h2><p class="muted">Your recent Dr4g0n ROX bookings.</p></div></section><section class="section"><div class="container" id="list"></div></section><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();let h=load('history',[]);list.innerHTML=h.length?h.map(b=>`<div class="card theatre"><div><h3>${b.movie?.title}</h3><p class="muted">${b.bookingId} • ${b.date} • ${b.time}</p><p>${b.theatre?.name}<br>Seats: ${b.seats?.join(', ')} • ${money(b.total||0)}</p></div><button class="btn" onclick="save('booking',${JSON.stringify(h[0]).replace(/"/g,'&quot;')});location.href='ticket.html'">View Ticket</button></div>`).join(''):'<div class="card"><h3>No bookings yet</h3><button class="btn" onclick="location.href=\'home.html\'">Book Movie</button></div>'</script></body></html>
