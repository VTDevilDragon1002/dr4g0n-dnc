<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNC ROX Show</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0441;
  }

  .header {
    text-align: center;
    padding: 10px;
    color: white;
  }

  .header h2 {
    margin: 0;
    color: white;
  }

  .search-box {
    text-align: center;
    margin: 10px 0;
  }

  .search-box input {
    width: 80%;
    padding: 8px;
    border: 2px solid black;
    border-radius: 5px;
    font-size: 16px;
    text-align: center;
   } 

  .cinema-banner {
    display: block;
    width: 90%;
    height: auto;
    margin : 10px auto;
    justify-content: center;
    
  }

  .lang-filters {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  

  /* Carousel */
  .carousel {
    width: 85%;
    overflow: hidden;
    position: relative;
    margin: 15px auto;
    justify-content: center;
  }

  .carousel-inner {
    display: flex;
    transition: transform 0.5s ease-in-out;
  }

  .carousel img {
    width: 100%;
    border-radius: 10px;
  }

  .dots {
    text-align: center;
    margin-top: 5px;
  }

  .dots span {
    height: 10px;
    width: 10px;
    margin: 0 3px;
    background-color: #060000;
    border-radius: 50%;
    display: inline-block;
    transition: background-color 0.3s;
  }

  .dots span.active {
    background-color: white;
  }

  h2 {
    margin-left: 15px;
    color: white;
  }

  .movies {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .movie-card {
    width: 30%;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,0.2);
    text-align: center;
    padding: 5px;
  }

  .movie-card img {
    width: 100%;
    border-radius: 8px;
  }

  .movie-card p {
    margin: 5px 0;
    font-size: 14px;
  }

  .rating {
    color: red;
    font-weight: bold;
  }

  @media (max-width: 768px) {
    .movie-card {
      width: 45%;
    }
  }

  @media (max-width: 480px) {
    .movie-card {
      width: 90%;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h4>Welcome to</h4>
  <h2>DNC ROX Show</h2>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search movies..." onkeyup="searchMovies()">
</div>

<!-- 🎥 Theatre Banner -->
<img class="cinema-banner" src="DNC.jpg" alt="Cinema Hall">

<!-- 🎬 Carousel Section -->
<div class="carousel">
  <div class="carousel-inner" id="carousel">
    <img src="lik.jpg" alt="Teaser 1">
    <img src="dude.avif" alt="Teaser 2">
    <img src="str51.jpg" alt="Teaser 3">
  </div>
</div>
<div class="dots">
  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>

<h2>Recommendation</h2>
<div class="movies" id="movieList">
  <div class="movie-card" data-lang="Tamil">
    <img src="lik.jpg" alt="Good Bad Ugly">
    <p><span class="rating">⭐ 8.4</span> | 85.2K votes</p>
    <p>Good Bad Ugly</p>
  </div>

  <div class="movie-card" data-lang="English">
    <img src="str51.jpg" alt="Ten Hours">
    <p><span class="rating">⭐ 7.6</span> | 464 votes</p>
    <p>Ten Hours</p>
  </div>

  <div class="movie-card" data-lang="Tamil">
    <img src="dude.avif" alt="Veera Dheera Sooran">
    <p><span class="rating">⭐ 8.4</span> | 30.3K votes</p>
    <p>Veera Dheera Sooran</p>
  </div>

  <div class="movie-card" data-lang="Hindi">
    <img src="lik.jpg" alt="Bollywood Star">
    <p><span class="rating">⭐ 7.8</span> | 20K votes</p>
    <p>Bollywood Star</p>
  </div>

  <div class="movie-card" data-lang="Telugu">
    <img src="dude.avif" alt="Power Hero">
    <p><span class="rating">⭐ 8.0</span> | 40K votes</p>
    <p>Power Hero</p>
  </div>
</div>

<script>
  // 🎞 Carousel Auto Slide
  let slideIndex = 0;
  const slides = document.querySelectorAll(".carousel img");
  const dots = document.querySelectorAll(".dot");

  function showSlides() {
    slides.forEach((slide, i) => {
      slide.style.display = (i === slideIndex) ? "block" : "none";
      dots[i].classList.toggle("active", i === slideIndex);
    });
    slideIndex = (slideIndex + 1) % slides.length;
    setTimeout(showSlides, 3000);
  }
  showSlides();

  // 🔍 Search Function
  function searchMovies() {
    const query = document.getElementById("search").value.toLowerCase();
    const movies = document.querySelectorAll(".movie-card");
    movies.forEach(movie => {
      const title = movie.querySelector("p:last-child").textContent.toLowerCase();
      movie.style.display = title.includes(query) ? "block" : "none";
    });
  }

  // 🌐 Language Filter
  function filterMovies(lang) {
    const movies = document.querySelectorAll(".movie-card");
    movies.forEach(movie => {
      if (lang === 'All' || movie.dataset.lang === lang) {
        movie.style.display = "block";
      } else {
        movie.style.display = "none";
      }
    });
  }
</script>

</body>
</html>
