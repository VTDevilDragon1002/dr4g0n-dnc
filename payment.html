<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payment</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Payment</h2><p class="muted">Choose payment method and confirm booking.</p></div></section><section class="section"><div class="container pay-grid"><div class="card"><button class="pay-tab active" onclick="method('UPI')">UPI</button><button class="pay-tab" onclick="method('Card')">Credit / Debit Card</button><button class="pay-tab" onclick="method('Net Banking')">Net Banking</button><button class="pay-tab" onclick="method('Wallet')">Wallet</button></div><div class="card"><h3 id="payTitle">UPI Payment</h3><div id="fields"><input placeholder="Enter UPI ID"></div><hr style="border-color:#26293d"><h3>Booking Summary</h3><p id="summary"></p><h2 id="total"></h2><button class="btn" onclick="pay()">Pay & Confirm</button></div></div></section><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();let b=requireBooking(),payMethod='UPI';function render(){let fee=38;let total=(b.seatAmount||0)+(b.snackAmount||0)+fee;b.fee=fee;b.total=total;save('booking',b);summary.innerHTML=`Movie: <b>${b.movie?.title}</b><br>Theatre: <b>${b.theatre?.name}</b><br>Date/Time: <b>${b.date} • ${b.time}</b><br>Seats: <b>${b.seats?.join(', ')}</b><br>Snacks: <b>${money(b.snackAmount||0)}</b><br>Convenience fee: <b>${money(fee)}</b>`;document.getElementById('total').textContent='Total '+money(total)}function method(m){payMethod=m;document.querySelectorAll('.pay-tab').forEach(x=>x.classList.remove('active'));event.target.classList.add('active');payTitle.textContent=m+' Payment';fields.innerHTML=m==='UPI'?'<input placeholder="Enter UPI ID">':m==='Card'?'<input placeholder="Card Number"><div class="row"><input placeholder="MM/YY"><input placeholder="CVV"></div>':'<select><option>'+m+' Option</option><option>Dr4g0n Bank</option><option>ROX Wallet</option></select>'}function pay(){b.payment=payMethod;b.bookingId='DRX'+Date.now().toString().slice(-8);save('booking',b);location.href='processing.html'}render()</script></body></html>
