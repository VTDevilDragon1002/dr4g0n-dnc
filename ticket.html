<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Your Ticket</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Your Ticket</h2><p class="muted">Show this QR ticket at theatre entry.</p></div></section><div class="ticket" id="ticket"><div class="ticket-top"><h2 id="mt"></h2><p id="bid"></p></div><div class="ticket-body"><div><h3 id="th"></h3><p id="dt"></p><p id="st"></p><p id="sn"></p><h2 id="ttl"></h2><button class="btn" onclick="print()">Print / Save Ticket</button> <button class="btn secondary" onclick="location.href='booking-history.html'">Booking History</button></div><canvas id="qr" class="qr" width="180" height="180"></canvas></div></div><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();let b=load('booking',{});mt.textContent=b.movie?.title||'Dr4g0n ROX';bid.textContent='Booking ID: '+b.bookingId;th.textContent=b.theatre?.name||'';dt.textContent=`${b.date} • ${b.time}`;st.textContent='Seats: '+(b.seats||[]).join(', ');sn.textContent='Snacks: '+((b.snacks||[]).map(x=>x.name).join(', ')||'No snacks');ttl.textContent='Paid '+money(b.total||0);let history=load('history',[]);if(b.bookingId&&!history.find(x=>x.bookingId===b.bookingId)){history.unshift(b);save('history',history)}function drawQR(text){const c=document.getElementById('qr'),ctx=c.getContext('2d'),n=21,s=8;ctx.fillStyle='#fff';ctx.fillRect(0,0,180,180);ctx.fillStyle='#111';function box(x,y,w){ctx.fillRect(10+x*s,10+y*s,w*s,w*s)}[[0,0],[14,0],[0,14]].forEach(p=>{box(p[0],p[1],7);ctx.fillStyle='#fff';box(p[0]+1,p[1]+1,5);ctx.fillStyle='#111';box(p[0]+2,p[1]+2,3)});let seed=0;for(let ch of text)seed=(seed*31+ch.charCodeAt(0))>>>0;for(let y=0;y<n;y++)for(let x=0;x<n;x++){let inFinder=(x<8&&y<8)||(x>12&&y<8)||(x<8&&y>12);if(!inFinder&&(((x*y+seed+x+y)%5===0)||((x+seed)%7===0&&(y%2===0))))box(x,y,1)}}drawQR(JSON.stringify({id:b.bookingId,movie:b.movie?.title,seats:b.seats,total:b.total}))</script></body></html>
