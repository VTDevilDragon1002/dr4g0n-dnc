<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Select Showtime</title><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="nav"></div><section class="page-head"><div class="container"><h2>Select Date & Showtime</h2><p class="muted" id="where"></p></div></section><section class="section"><div class="container"><div class="card"><label>Date</label><input type="date" id="date"><h3>Available Shows</h3><div class="times" id="times"></div></div></div></section><div id="foot"></div><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('nav').innerHTML=nav();document.getElementById('foot').innerHTML=footer();let b=requireBooking();where.textContent=`${b.movie?.title||'Movie'} at ${b.theatre?.name||'Theatre'}`;date.value=new Date().toISOString().split('T')[0];times.innerHTML=TIMES.map(t=>`<button class="time" onclick="pick('${t}')">${t}</button>`).join('');function pick(t){b.date=date.value;b.time=t;save('booking',b);location.href='seats.html'}</script></body></html>
